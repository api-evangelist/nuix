aid: nuix
name: Nuix
description: Nuix is an investigative analytics and intelligence platform providing
  REST APIs for processing unstructured data, managing forensic cases, running entity
  extraction, conducting digital investigations, and supporting eDiscovery and compliance
  workflows across legal, security, and law enforcement domains.
