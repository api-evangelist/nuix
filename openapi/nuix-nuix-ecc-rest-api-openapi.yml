security:
  - BasicAuth: []
servers:
  - url: '{protocol}://{address}:{port}/api/ecc'
    variables:
      protocol:
        default: https
        description: protocol for communication
        enum:
          - http
          - https
      address:
        default: 127.0.0.1
        description: The location which the ECC resides
      port:
        default: '80'
        description: 80, 443 or alternative
tags:
  - name: Case
  - name: Computer
  - name: Computer Configuration
  - name: Collection Configuration
  - name: Group
  - name: Custodian
  - name: Target
  - name: Collection and Survey
  - name: Other Tasks
  - name: Job
  - name: Log
  - name: Utility
components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    Extension:
      type: object
      description: Describes a File Extension
      properties:
        extension:
          type: string
          description: file type extension (do not include the preceding dot)
        collectAll:
          type: boolean
          description: If `true`, collect this file type regardless of keyword search
    Evidence:
      type: object
      properties:
        destination:
          type: string
          description: destination where evidence is to be saved
        credentials:
          type: boolean
          description: Set to `true` if credentials are supplied to access the destination
        createFileSafe:
          type: boolean
          description: Set to `true` to create a FileSafe, `false` save native copies of the files
        compression:
          type: string
          description: Compression setting for saved data.  One of `None`, `Medium`, `High` (used only if createFileSafe = `true`)
          enum:
            - None
            - Medium
            - High
        segmentSize:
          type: integer
          description: size of each FileSafe segment (used only if createFileSafe = `true`)
        segmentSizeUnit:
          type: string
          description: unit of measure which applies to segmentSize.  One of `KB`, `MB`, or `GB` (used only if createFileSafe = `true`)
          enum:
            - KB
            - MB
            - GB
        overwrite:
          type: boolean
          description: whether to overwrite existing files at the destination (used only if createFileSafe = `false`)
        maintainFullPath:
          type: boolean
          description: whether to maintain the full path of the file at the destination (used only if createFieSafe = false)
        validateCollection:
          type: boolean
          description: whether to validate the entire FileSafe after collection is completed
    FileType:
      type: object
      description: describes the file type filters used in the collection (this object is optional)
      properties:
        analyzeSignatures:
          type: boolean
          description: when `true`, read the beginning of each file to determine file type.  When `false` use filename extension only to determine file type.
        mode:
          type: string
          description: One of `Include` or `Exclude` - include or exclude the file types listed in the `extensions` array
          enum:
            - Include
            - Exclude
        extensions:
          type: array
          description: array of one or more file type extensions
          items:
            $ref: '#/components/schemas/Extension'
    DateCriteria:
      type: object
      properties:
        type:
          type: string
          description: |-
            One of `From` or `Last`.

            `From` specifies absolute start/end dates.

            `Last` specifies last number of days back from the current date
          enum:
            - From
            - Last
        useGMT:
          type: boolean
          description: |-
            `true` specifies GMT for time, `false` specifies local time
        startDate:
          type: string
          description: inclusive start date in the format `yyyy-mm-ddThh:mm:ss` (only used if type = `From`)
        endDate:
          type: string
          description: inclusive end date in the format `yyyy-mm-ddThh:mm:ss` (only used if type = `From`)
        numDays:
          type: integer
          description: number of days back from the current date (only used if type = `Last`)
        checkCreation:
          type: boolean
          description: |-
            When `true`, apply date criteria to creation date
        checkModification:
          type: boolean
          description: |-
            When `true` apply date criteria to modification date
        checkAccess:
          type: boolean
          description: |-
            When `true`, apply date criteria to access date
    FolderSpec:
      type: object
      properties:
        folder:
          type: string
          description: full path of the folder to collect from.
        excludeFolders:
          type: array
          items:
            type: string
            description: optional, path(s) of folder(s) to exclude.  These are relative paths, relative to the `folder` to collect from.
        excludeFiles:
          type: array
          items:
            type: string
            description: optional, path(s) of file(s) to exclude.  These are relative paths, relative to the `folder` to collect from.
        excludeWildcards:
          type: array
          items:
            type: string
            description: |-
              optional, wildcard specification(s) (e.g *.pdf) specifying files to exclude from `folder` path.

              Note that wildcard exclusions are recursive under `folder` path.
    Keyword:
      type: object
      properties:
        expressionName:
          type: string
          description: human-readable description of the search expression
        expression:
          type: string
          description: search expression
        caseSensitive:
          type: boolean
          description: When `true` specifies the search should be case-sensitive
        regExpression:
          type: boolean
          description: When `true` specifies the `expression` is interpreted as a Regular Expression
    Hash:
      type: object
      properties:
        hashValue:
          type: string
          description: 32-character MD5 hash value
        fileSize:
          type: number
          description: |-
            Optional file size.

            If provided, will be used to match before calculating hash
        microHash:
          type: string
          description: |-
            Optional MD5 hash value of the first 64 KB of a file.

            Used to match before calculating a full hash
    JobCreated:
      type: object
      properties:
        id:
          type: integer
          description: ID of task
        taskName:
          type: string
          description: Name of task, one of `Collect`, `Relocate` `Deploy` or `Launch`.
        taskNum:
          type: integer
          description: Task number, defines sequence in a multi-job collection
        totalTasks:
          type: integer
          description: Total number of tasks in the collection
    TargetInputs:
      type: object
      properties:
        types:
          type: string
          description: Path, Local Path, or AutoDetect
          enum:
            - Path
            - Local Path
            - AutoDetect
        location:
          type: string
          description: full path or AutoDetect setting for the source
        exclusion:
          type: string
          description: excluded subfolders in the location (only for Path type)
    Case:
      type: object
      properties:
        id:
          type: integer
          description: id of the case
        name:
          type: string
          description: name of the case
        status:
          type: string
          description: case status, Open or Closed
    Computer:
      type: object
      properties:
        name:
          type: string
          description: name of the computer
        fullName:
          type: string
          description: name of the computer including domain
        description:
          type: string
          description: description of the computer
          nullable: true
        UUID:
          type: string
          description: GUID uniquely identifying this computer, used in all other api functions
        presence:
          type: string
          description: One of `ONLINE`, `NEARLINE` or `OFFLINE`
          enum:
            - ONLINE
            - NEARLINE
            - OFFLINE
        purpose:
          type: string
          description: One of `Client` or `Admin Console`
          enum:
            - Client
            - Admin Console
        staging:
          type: boolean
          description: Set to `true` if the computer is a staging computer
        pairingState:
          type: string
          description: One of `Paired`, `Awaiting`, or `Denied`
          enum:
            - Paired
            - Awaiting
            - Denied
        firstContact:
          type: string
          description: date/time of first contact in the format `yyyy-mm-ddThh:mm:ss`
        lastContact:
          type: string
          description: date/time of last contact in the format `yyyy-mm-ddThh:mm:ss`
        osName:
          type: string
          description: name of the OS
        lastUser:
          type: string
          description: last logged in username
        searchEnabled:
          type: boolean
          description: Set to `true` if Advanced Search is enabled on this computer
    ComputerConf:
      type: object
      properties:
        id:
          type: integer
          description: id of the Computer Configuration
        name:
          type: string
          description: name of the Computer Configuration
        description:
          type: string
          description: description of the Computer Configuration
        keepAliveInterval:
          type: integer
          description: frequency (sec) a client sends a keep-alive request to the server
        keepAliveTimeout:
          type: integer
          description: time (sec) a client will wait for a response from the last keep-alive request
        resourceWaitTime:
          type: integer
          description: time (sec) a client will wait for a given resource (e.g. network share)
        jobWaitTime:
          type: integer
          description: frequency (sec) a client polls the server for new jobs (fallback to publish/subscribe)
        startJobsWaitTime:
          type: integer
          description: time (sec) to delay a job from starting
        statusUpdateWaitTime:
          type: integer
          description: frequency (sec) which a client to reports status of a running job
        systemInfoUpdateWaitTime:
          type: integer
          description: frequency (sec) which a client to reports current system info
        minPortRange:
          type: integer
          description: beginning of the TCP port range used for Deploy or Relocate jobs
        maxPortRange:
          type: integer
          description: end of the TCP port range used for Deploy or Relocate jobs
        enableLogs:
          type: boolean
          description: true if diagnostic logging is enabled
        throttleOutput:
          type: boolean
          description: true if out should be throttled
        maxBandwidthMbps:
          type: integer
          description: max bandwidth (in Mbps) allowed if output is throttled
        altDestination:
          type: string
          description: The path to an alternate destination if a primary job destination is unreachable
        altDestHasCredentials:
          type: boolean
          description: Whether the alternate destination requires credentials to access
    Custodian:
      type: object
      properties:
        id:
          type: integer
          description: id of the custodian
        name:
          type: string
          description: name of the custodian
    Group:
      type: object
      properties:
        id:
          type: integer
          description: id of the group
        name:
          type: string
          description: name of the group
        description:
          type: string
          description: description of the group
        deleted:
          type: boolean
          description: true if the group has been deleted
    Target:
      type: object
      properties:
        id:
          type: integer
          description: id of the Target
        name:
          type: string
          description: name of the target
        description:
          type: string
          description: description of the target
        custodianId:
          type: integer
          description: id of the Custodian this target belongs to
        computerName:
          type: string
          description: name of the Computer this target belongs to
        computerGUID:
          type: string
          description: GUID of the Computer this target belongs to
        Inputs:
          type: array
          description: array of inputs in the target
          items:
            $ref: '#/components/schemas/TargetInputs'
    LogEntry:
      type: object
      properties:
        name:
          type: string
          description: name of entry, either `Error` or `Warning`
          enum:
            - Error
            - Warning
        scope:
          type: string
          description: defines the scope of the entry, either `Client` or `Server`
          enum:
            - Client
            - Server
        severity:
          type: string
          description: Log entry severity, one of `Error`, `Warning`, `Info`, or `Debug`
          enum:
            - Error
            - Warning
            - Info
            - Debug
        grouping:
          type: string
          description: grouping for this log entry
        jobId:
          type: integer
          description: id of the job the log entry is associated with
        userId:
          type: integer
          description: id of the ECC user logged in when the log entry was created
          nullable: true
        description:
          type: string
          description: description of the event logged
          nullable: true
        date:
          type: string
          description: date and time of the log entry
        computerId:
          type: string
          description: UUID of the computer on which the event occurred
    ComputerJobs:
      type: object
      properties:
        computerName:
          type: string
          description: name of the computer where the job is running
        computerId:
          type: string
          description: UUID of the computer
        jobs:
          type: array
          description: List of tasks being run
          items:
            $ref: '#/components/schemas/JobCreated'
    CollectionDetail:
      type: object
      properties:
        id:
          type: integer
          description: id of the collection
        caseId:
          type: integer
          description: id of the case that owns the collection
        name:
          type: string
          description: name of the collection
        status:
          type: string
          description: status of the case
    Task:
      type: object
      properties:
        taskNum:
          type: integer
          description: 0-based index of tasks (jobs) to be run in this collection configuration
        label:
          type: string
          description: |-
            user-defined label for this job.

            Can be used as search criteria for jobs
        impersonation:
          type: string
          description: The enumeration value `None` or `Logged on User`
          enum:
            - None
            - Logged on User
        taskType:
          type: string
          description: |-
            The type of task.  One of `Collect`, `Relocate`, `Deploy` or `Launch`.
            This value will determine which fields follow.
          enum:
            - Collect
            - Relocate
            - Deploy
            - Launch
        Evidence:
          $ref: '#/components/schemas/Evidence'
        FileType:
          $ref: '#/components/schemas/FileType'
        DateRange:
          type: object
          properties:
            dates:
              type: array
              description: array of one or more date criteria
              items:
                $ref: '#/components/schemas/DateCriteria'
        AdvancedSearch:
          type: object
          properties:
            keywords:
              type: array
              description: array of keywords
              items:
                $ref: '#/components/schemas/Keyword'
        Hash:
          type: object
          properties:
            hashType:
              type: string
              description: always `MD5`
              enum:
                - MD5
            hashes:
              type: array
              description: array of hash values used to identify files to be collected
              items:
                $ref: '#/components/schemas/Hash'
        Volatile:
          type: object
          description: Describes a volatile configuration
          properties:
            collectVolatile:
              type: boolean
              description: Whether to collect volatile information,  When `false` the remaining fields are ignored
            collectHandles:
              type: boolean
              description: Whether to collect handles as part of the collection (collectVolatile must be `true`)
            collectionScreenShots:
              type: boolean
              description: Whether to capture screen shots of all windows (requires impersonation, collectVolatile must be `true`)
            screenShotFormat:
              type: string
              description: The graphic file format to save screen shot images.  One of `PNG` or `JPG` (collectScreenShots must be `true`)
              enum:
                - PNG
                - JPG
        RAM:
          type: object
          description: Describes RAM collection
          properties:
            collectRAM:
              type: boolean
              description: When `true` saves a bit-for-bit image of the RAM
        SmartMover:
          type: object
          description: For a `Deploy` or `Relocate` task.  Specifies the copying or moving of files from one ECC Client to another
          properties:
            destinationFolder:
              type: string
              description: folder on the destination computer where evidence is to be copied
            destComputerName:
              type: string
              description: name of the destination computer
            destComputerId:
              type: string
              description: GUID of the destination computer
            moveOrCopy:
              type: string
              description: |-
                `Move` or `Copy`.

                Either setting will copy files to the destination computer.  `Move` will delete evidence from the source after the copy is complete.
              enum:
                - Move
                - Copy
            relocateData:
              type: boolean
              description: When `true` relocate the evidence (data files)
            relocateLogs:
              type: boolean
              description: When `true` relocate the collection logs
    TaskToCreate:
      type: object
      properties:
        parentConfigId:
          type: integer
          description: optional, id of the parent Collection Configuration which holds the task to be copied. If omitted, the task is created from given parameters.
        taskNum:
          type: integer
          description: optional, id of the task to be copied (within the parent conf specified above).  Required if `parentConfigId` is specified.
        taskType:
          type: string
          description: |-
            type of task\: one of `Collect`, `Relocate`, `Deploy`, or `Launch` (currently only `Collect` and `Relocate` are supported).
            
            **Note\:** If copying an existing task, the `taskType` cannot be changed in the new task.
          enum:
            - Collect
            - Relocate
            - Deploy
            - Launch
        label:
          type: string
          description: |-
            optional, user-defined label for this job.

            Can be used as search criteria for jobs
        impersonation:
          type: string
          description: None or Logged on User
          enum:
            - None
            - Logged on User
        Evidence:
          $ref: '#/components/schemas/Evidence'
        FileType:
          $ref: '#/components/schemas/FileType'
        DateRange:
          type: object
          properties:
            dates:
              type: array
              description: array of one or more date criteria
              items:
                $ref: '#/components/schemas/DateCriteria'
        AdvancedSearch:
          type: object
          properties:
            keywords:
              type: array
              description: array of keywords
              items:
                $ref: '#/components/schemas/Keyword'
        Hash:
          type: object
          properties:
            hashType:
              type: string
              description: always MD5
              enum:
                - MD5
            hashes:
              type: array
              description: array of hashes
              items:
                $ref: '#/components/schemas/Hash'
        Volatile:
          type: object
          description: Describes a volatile configuration
          properties:
            collectVolatile:
              type: boolean
              description: Whether to collect volatile information,  When `false` the remaining fields are ignored
            collectHandles:
              type: boolean
              description: Whether to collect handles as part of the collection (collectVolatile must be `true`)
            collectionScreenShots:
              type: boolean
              description: Whether to capture screen shots of all windows (requires impersonation, collectVolatile must be `true`)
            screenShotFormat:
              type: string
              description: The graphic file format to save screen shot images.  One of `PNG` or `JPG` (collectScreenShots must be `true`)
              enum:
                - PNG
                - JPG
        RAM:
          type: object
          description: Describes RAM collection
          properties:
            collectRAM:
              type: boolean
              description: When `true` saves a bit-for-bit image of the RAM
        SmartMover:
          type: object
          description: For a `Deploy` or `Relocate` task.  Specifies the copying or moving of files from one ECC Client to another
          properties:
            destinationFolder:
              type: string
              description: folder on the destination computer where evidence is to be copied
            destComputerName:
              type: string
              description: name of the destination computer
            destComputerId:
              type: string
              description: GUID of the destination computer
            moveOrCopy:
              type: string
              description: |-
                Move or Copy.

                Move to delete evidence from the source after the copy is complete
              enum:
                - Move
                - Copy
            relocateData:
              type: boolean
              description: true to relocate the evidence (data)
            relocateLogs:
              type: boolean
              description: true to relocate the logs
    TaskCreated:
      type: object
      properties:
        parentConfigId:
          type: integer
          description: Optional, id of the parent Collection Configuration of the new task to be copied. If omitted, the task is created from given params.
        taskNum:
          type: integer
          description: Optional, id of the task to be copied (within the parent conf specified above).  Required if parentConfigId is specified.
        taskType:
          type: string
          description: |-
            Type of task\: one of `Collect`, `Relocate`, `Deploy`, or `Launch` (currently only `Collect` and `Relocate` are supported).  NOTE\: If copying an Existing task, the `taskType` cannot be changed in the new task.
          enum:
            - Collect
            - Relocate
            - Deploy
            - Launch
        label:
          type: string
          description: |-
            Optional, user-defined label for this job.

            Can be used as search criteria for jobs.
    Configuration:
      type: object
      properties:
        id:
          type: integer
          description: id of the collection configuration
        name:
          type: string
          description: name of the collection configuration
        description:
          type: string
          description: description of the collection configuration
          nullable: true
        template:
          type: string
          description: name of the Template used by the collection configuration
          nullable: true
        category:
          type: string
          description: name of the Category (optional value attached to a collection configuration)
          nullable: true
        targets:
          type: array
          description: array of Target IDs used in this collection configuration
          items:
            type: integer
            description: Target ID
          nullable: true
        computers:
          type: array
          description: array of Computer GUIDs used in this collection configuration
          items:
            type: string
            description: computer GUID
          nullable: true
        hasInputs:
          type: boolean
          description: true if any input paths exist within the targets or computers specified in this collection configuration
        tasks:
          type: array
          description: array of Tasks used in this collection configuration
          items:
            $ref: '#/components/schemas/Task'
    jobDetail:
