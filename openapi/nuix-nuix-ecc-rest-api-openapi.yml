                    id: 101
                    message: 'Group ID {groupId} cannot be renamed with an empty string'
                failed_group_modify_add_remove:
                  summary: 'Cannot add and remove the same custodian'
                  value:
                    code: 400
                    id: 101
                    message: 'Custodian ID {id} was specified for both addition and removal'
                failed_group_modify_already_added:
                  summary: 'Custodian already present'
                  value:
                    code: 400
                    id: 101
                    message: 'Custodian ID {id} is already in the group but specified for addition'
                failed_group_modify_unexpected:
                  summary: 'Custodian could not be added to group'
                  value:
                    code: 400
                    id: 101
                    message: 'Unexpected DB error: Custodian ID {} was not added to the group, {}'
                failed_group_modify_id:
                  summary: 'Group not found'
                  value:
                    code: 400
                    id: 101
                    message: 'Group ID {} was not found.'
