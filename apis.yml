apis:
- aid: nuix:nuix-core-engine-rest-api
  name: Nuix Core Engine REST API
  description: Primary RESTful service for processing unstructured data, managing
    forensic cases, ingesting evidence, running search queries, performing OCR and
    entity extraction, and orchestrating asynchronous processing jobs within Nuix
    Core Engine.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.nuix.com/latest/
  baseURL: https://localhost:4444
