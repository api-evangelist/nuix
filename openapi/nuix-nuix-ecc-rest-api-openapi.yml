openapi: 3.0.1
info:
  title: NUIX ECC REST API Command Reference
  description: |-
    Welcome to the Nuix ECC REST API command reference. From here you can access all available ECC REST APIs.  You can also send REST commands to your running ECC Server, as well as view the responses.
    
    **Note\:** The Nuix ECC User Guide includes a gloassary which defines specialized terms such as `Case`, `Custodian` and `Target` which are mentioned throughout this command reference.
    
    **Note\:** This command reference has been updated for Nuix ECC version 9.12.0.
  contact:
    name: Nuix
    url: https://nuix.github.io/sdk-docs/latest/
    email: APISupport@nuix.com
  license:
    name: Licence
    url: https://www.nuix.com/sites/default/files/20200210_EULA_v1.pdf
  version: ${customer.version}
paths:
  /v2/cases:
    get:
      tags:
        - Case
      summary: Lists all cases
      description: |-
        Lists all cases defined on the connected server.

        **Note:** both open and closed cases are listed.
      operationId: listCasesAll
      responses:
        '200':
          description: Successful Listing of cases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listCasesResponse'
              example:
                cases:
                  - id: 1
                    name: Default
                    status: Open
                  - id: 100
                    name: Testing
                    status: Closed
                  - id: 103
                    name: latest
                    status: Open
    post:
      tags:
        - Case
      summary: Create a new case
      description: |-
        Create a new case.

        id is always 0 when submitting this request
      operationId: createCase
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createCaseRequest'
            example:
              id: 0
              name: New Case Name
      responses:
        '200':
          description: Case was created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 200
                id: 105
                message: OK
  /v2/cases/{caseId}:
    get:
      tags:
        - Case
      summary: Lists the specified case
      description: |-
        Lists information about the specified case.
      operationId: listCases
      parameters:
        - in: path
          name: caseId
          description: Case id
          schema:
            type: integer
          required: true
      responses:
        '200':
          description: Successful Listing of cases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listCasesResponse'
              example:
                cases:
                  - id: 103
                    name: latest
                    status: Open
  /v2/cases/{id}:
    put:
      tags:
        - Case
      summary: Rename a case and-or change case status
      description: Rename and/or change the status of the specfied case
      operationId: modifyCase
      parameters:
        - name: id
          in: path
          description: The id of the Case to rename or change status
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/modifyCaseRequest'
            examples:
              change_case_name:
                summary: Change case name
                value:
                  name: Revised Case Name
              cloase_a_case:
                summary: Rename and close a case
                value:
                  name: Investigation XYZ - Completed
                  status: Closed
      responses:
        '200':
          description: Case was modified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 200
                id: 101
                message: OK
        '400':
          description: Failed to modify case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              examples:
                case_id_not_found:
                  summary: 'Case ID not found'
                  value:
                    code: 400
                    id: 101
                    message: 'Case ID {id} was not found.'
                case_name_and_status_missing:
                  summary: 'Neither case name nor status provided'
                  value:
                    code: 400
                    id: 101
                    message: 'Case not updated\: neither status nor name were provided.'
        '504':
          description: Waiting for the model to load
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 504
                id: 101
                message: Waiting for the model to load
    delete:
      tags:
        - Case
      summary: Delete a case
      description: |-
        Deletes the case identified by the case ignored.

        **Note\:** Only closed cases can be deleted.

        **Warning:** Any jobs associated with the specified case
        will also be deleted.
      operationId: deleteCase
      parameters:
        - name: id
          in: path
          description: Case identification token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Case was deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 200
                id: 101
                message: OK
        '400':
          description: Specified Case ID is [ invalid | not found | in use ] and cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Invalid Case ID supplied
        '500':
          description: Delete Case command failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 500
                id: 101
                message: Delete Case Command failed
        '504':
          description: Waiting for the model to load
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 504
                id: 101
                message: Waiting for the model to load
  /v2/computers:
    post:
      tags:
        - Computer
      summary: Lists computers (endpoints) with ECC installed
      description: |-
        Lists computers (endpoints) with ECC Client or ECC Admin Console installed.
        If the `computerId` field in the JSON body is provided, all other fields are ignored, as only that single computer will be returned.  Otherwise a list of computers will be returned matching the criteria provided in the `filters` section.

        Computer Fields available for filters and sorting\:

        | Field name       | Type    | Description / Possible Values   |
        | ---------------- | ------- | ------------------------------- |
        | ID               | long    | id of computer                  |
        | Name             | String  | name of the computer            |
        | Description      | String  | computer description (may be null)                             |
        | ConfigId         | String  | id of the Computer Configuration associated with this computer |
        | Purpose          | String  | `Client` or `Admin Console`     |
        | Presence         | String  | `Online`, `Nearline` or `Offline` - see note, below            |
        | PairingState     | String  | `Paired`, `Awaiting` or `Denied`  |
        | Staging          | Boolean | `true` if the computer is a staging computer                   |
        | TimeZoneID       | String  |                                 |
        | TimeZoneOffset   | String  |                                 |
        | FirstContactTime | String  | date/time of first contact in the format `yyyy-mm-ddThh:mm:ss` |
        | LastContactTime  | String  | date/time of last contact in the format `yyyy-mm-ddThh:mm:ss`  |
        | UUID             | String  | GUID uniquely identifying this computer                        |
        | OSName           | String  | name of the OS                  |
        | SearchEnabled    | Boolean | `true` specifies  Advanced Search is enabled on this computer  |
        | ClientParameters | String  |                                 |
        | ClientPublicKey  | String  |                                 |
        | Config           | long    |                                 |
        | ConfigName       | String  |                                 |
        | FullName         | String  | name of the computer including domain                          |
        | History          | String  |                                 |
        | LastUser         | String  | last logged in username         |
        | OSName           | String  | name of the OS                  |
        | PeerIP           | String  |                                 |
        | ServerParameters | String  |                                 |
        | ServerPrivateKey | String  |                                 |
        | ServerPublicKey  | String  |                                 |
        **Note\:** Presence values are case-sensitive: they must be `Nearline`, `Online` or `Offline` in a request body. Values returned for Presence however, are returned in ALL UPPERCASE.
      operationId: listComputersByFilter
      parameters:
        - name: offset
          in: query
          description: offset (0-based) into the list of computers at which retrieval should start
          required: false
          schema:
            type: integer
        - name: version
          in: query
          description: |-
            version of the Jobs table from the last call to this function.

            The version of the table is returned in the response body for this query in the field `tableVersion`.

            If `version` is supplied, it is compared to the current version of the Jobs table.

            If the version numbers match, there is no updated data since the last call, 
            and the query is aborted with a 204, 'No Content.' response code.
          required: false
          schema:
            type: integer
        - name: countOnly
          in: query
          description: |-
            if `true`, the total count for this query (ignoring `limit` and `offset`) is returned in the Response Body, with no other data.

            This should be used ahead of the actual query to determine the total number of records in the response.
          required: false
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/listComputerRequest'
            example:
              limit: -1
              sortBy: Name
              filters:
                - name: Presence
                  value: Online
                - name: Purpose
                  value: Client
      responses:
        '200':
          description: Computer Listing was submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  tableVersion:
                    type: integer
                    description: |-
                      current version of the computers table.

                      Use this in the query field `version` to prevent unneeded queries
                  totalCount:
                    type: integer
                    description: total number of computers for this response, as if `limit` was not provided
                  startRow:
                    type: integer
                    description: starting row of this response within the total count
                    nullable: true
                  endRow:
                    type: integer
                    description: ending row of this response within the total count
                    nullable: true
                  next:
                    type: string
                    description: |-
                      url to get the next set of responses.

                      Included only if `endRow` does not include all available responses.
                  computers:
                    type: array
                    description: array of computers in the response
                    items:
                      $ref: '#/components/schemas/Computer'
        '204':
          description: No Content/Match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 204
                id: 101
                message: No Content
        '400':
          description: Computer ID not found/Field was not found/Internal Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Invalid Computer ID supplied
  /v2/compConfigurations:
    get:
      tags:
        - Computer Configuration
      summary: Returns all Computer Configurations.
      description: |-
        Returns all Computer Configurations.  A Computer Configuration can be
        associated with multiple Computers.
      operationId: listComputerConfigsAll
      responses:
        '200':
          description: Computer Configuration submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listComputerConfResponse'
              example:
                compConfigurations:
                  - id: 2
                    name: Comp Config - Minimal Status
                    description: Comp Config with infrequent status updates
                    keepAliveInterval: 90
                    keepAliveTimeout: 30
                    resourceWaitTime: 86400
                    jobWaitTime:
                    startJobsWaitTime: 1
                    statusUpdateWaitTime: 600
                    systemInfoUpdateWaitTime: 86400
                    minPortRange: 0
                    maxPortRange: 65535
                    enableLogs: false
                    throttleOutput: false
                    maxBandwidthMbps: 50
                    altDestination: 
                    altDestHasCredentials: false
                  - id: 6
                    name: Comp Config - Spare Server
                    description: Comp Config with alt destination set to Spare Server
                    keepAliveInterval: 90
                    keepAliveTimeout: 30
                    resourceWaitTime: 86400
                    jobWaitTime:
                    startJobsWaitTime: 1
                    statusUpdateWaitTime: 60
                    systemInfoUpdateWaitTime: 86400
                    minPortRange: 0
                    maxPortRange: 65535
                    enableLogs: false
                    throttleOutput: false
                    maxBandwidthMbps: 50
                    altDestination: \\SPARE\CollectionShare
                    altDestHasCredentials: true
        '400':
          description: error response - computer configuration not retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              examples:
                confid_not_found:
                  summary: Computer Configuration ID not found
                  value:
                    code: 400
                    id: 101
                    message: Computer Configuration ID was not found
  /v2/compConfigurations/{confid}:
    get:
      tags:
        - Computer Configuration
      summary: Returns the specified Computer Configuration.
      description: Returns the Computer Configuration specified in the URL by `confid`, i.e. the Computer Configuration id.
      operationId: listComputerConfigsOne
      parameters:
        - name: confid
          in: query
          description: ID of the Computer Configuration to get
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Computer Configuration submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listComputerConfResponse'
              example:
                compConfigurations:
                  - id: 6
                    name: Comp Config - Spare Server
                    description: Comp Config with alt destination set to Spare Server
                    keepAliveInterval: 90
                    keepAliveTimeout: 30
                    resourceWaitTime: 86400
                    jobWaitTime:
                    startJobsWaitTime: 1
                    statusUpdateWaitTime: 60
                    systemInfoUpdateWaitTime: 86400
                    minPortRange: 0
                    maxPortRange: 65535
                    enableLogs: false
                    throttleOutput: false
                    maxBandwidthMbps: 50
                    altDestination: \\SPARE\CollectionShare
                    altDestHasCredentials: true
        '400':
          description: error response - computer configuration not retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              examples:
                confid_not_found:
                  summary: Computer Configuration ID not found
                  value:
                    code: 400
                    id: 101
                    message: Computer Configuration ID was not found
  /v2/configurations:
    get:
      tags:
        - Collection Configuration
      summary: Lists all Collection Configurations
      description: |-
        Lists all Collection Configurations defined on the connected server, or a filtered list if optional query params are used.

        **Note\:** In the response body, a Collect task type will be followed by an Evidence object, and optionally a FileType, DateRange, AdvancedSearch, Hash, Volatile, and RAM object.
      operationId: listConfigurations
      parameters:
        - name: id
          in: query
          description: |-
            The id of the configuration to list.

            **Note\:** if `id` is specified, the `category` query parameter is ignored.
          required: false
          schema:
            type: integer
            format: int32
        - name: category
          in: query
          description: Optional category assigned to one or more configurations.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful Listing of Configurations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listConfigurationsResponse'
              examples:
                targets_and_computers:
                  summary: Configuration with targets and computers
                  value:
                  - configurations:
                      - id: 101
                        name: Configuration Example
                        description: Example configuration with both targets and computers
                        template: Default
                        category: ''
                        targets:
                          - 106
                          - 142
                        computers:
                          - "5B05C769-6368-4608-A387-9525C4332B50"
                          - "E594B78A-15AD-4BA5-AB9D-68905B657DC6"
                        hasInputs:
                          false
                        tasks:
                          - taskNum: 0
                            taskType: Collect
                            impersonation: None
                            label: ''
                            Evidence:
                              destination: c:\collection
                              credentials: false
                              createFileSafe: true
                              compression: High
                              segmentSize: 2
                              segmentSizeUnit: GB
                              validateCollection: true
                            FileType:
                              analyzeSignatures: false
                              mode: Include
                              extensions:
                                - extension: ai
                                  collectAll: false
                          - taskNum: 1
                            taskType: Relocate
                            impersonation: None
                            label: ''
                            SmartMover:
                              destinationFolder: c:\collection
                              destComputerName: AUSYD-L-NX0142
                              destComputerId: E21287F5-9E96-6CFF-0624-056AFA28E902
                              moveOrCopy: Move
                              relocateData: true
                              relocateLogs: true
        '400':
          description: Invalid Configuration ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Invalid Configuration ID supplied
        '504':
          description: Waiting for the model to load
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 504
                id: 101
                message: Waiting for the model to load
    post:
      tags:
        - Collection Configuration
      summary: Creates a new Collection Configuration based on an existing Collection Configuration
      description: |-
        The new Collection Configuration is created with all tasks removed.

        Tasks can be created in the new Collection Configuration by either creating a new task from scratch, or referencing an existing Task in any other Collection Configuration, which is then copied into the new Collection Configuration.

        Copied tasks can be used as is, or modified.

        **Note\:** credentials used for the destination are stored in the task (Collect or Relocate) part of a Collection Configuration, so if credentials are needed, the appropriate task should be copied into the new Collection Configuration.

        ### The following objects vary depending on the value of taskType\:
        
        ### taskType = Collect
        
        If `parentConfigId` and `taskNum` values are *not* specified (i.e. a new task is being created), then an `Evidence` object must follow, with `FileType`, `DateRange`,
        `AdvancedSearch`, `Hash`, `Volatile`, and `RAM` objects optional.

        However, if a `parentConfigId` and `taskNum` *are* specified, then all following objects are optional, and required only to override what is already defined in the task being copied.

        **Note\:** existing criteria within a task are retained. For example, copying a task that contains `FileType` criteria and then adding `DateRange` criteria will result in a task that has both `FileType` and `DateRange`.

        ### taskType = Relocate
        
        If `parentConfigId` and `taskNum` values are *not* specified (i.e. a new task is being created), then a `SmartMover` object must follow.

        However, if `parentConfigId` and `taskNum` *are* specified, then no additional fields are required if the Relocate task is to be used 'as is'.

        See the GET configurations call for a definition of the objects within a task.
      operationId: createConfiguration
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createConfigurationRequest'
            examples:
              from_existing_task:
                summary: Create a configuration based on an existing Configuration and its Task.
                value:
                  baseConfigId: -1
                  newConfigName: some config name
                  description: new description
                  category: optional
                  tasks:
                    - parentConfigId: 101
                      taskNum: 0
                      taskType: Collect
                      label: new Label
      responses:
        '200':
          description: Configuration was created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createConfigurationResponse'
              example:
                id: 116
                name: some config name
                description: new description
                template: Default
                category: optional
                targets: []
                hasInputs: true
                tasks:
                  - taskNum: 0
                    taskType: Collect
                    impersonation: None
                    label: new Label
                    Evidence:
                      destination: c:\collection
                      credentials: false
                      createFileSafe: true
                      compression: High
                      segmentSize: 2
                      segmentSizeUnit: GB
                      validateCollection: true
                    FileType:
                      analyzeSignatures: false
                      mode: Include
                      extensions:
                        - extension: contact
                          collectAll: false
                        - extension: dbx
                          collectAll: false
                        - extension: eml
                          collectAll: false
                        - extension: group
                          collectAll: false
                        - extension: idx
                          collectAll: false
                        - extension: MailDB
                          collectAll: false
                        - extension: mbx
                          collectAll: false
                        - extension: msf
                          collectAll: false
                        - extension: msg
                          collectAll: false
                        - extension: msmessagestore
                          collectAll: false
                        - extension: ns2
                          collectAll: false
                        - extension: ns3
                          collectAll: false
                        - extension: ns4
                          collectAll: false
                        - extension: nsf
                          collectAll: false
                        - extension: nws
                          collectAll: false
                        - extension: oeaccount
                          collectAll: false
                        - extension: ost
                          collectAll: false
                        - extension: pbx
                          collectAll: false
                        - extension: pst
                          collectAll: false
                        - extension: slt
                          collectAll: false
                        - extension: snm
                          collectAll: false
                        - extension: wab
                          collectAll: false
        '400':
          description: No JSON body, config field missing, no new tasks, name is missing etc.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Invalid Configuration ID supplied
  /v2/configurations/{id}:
    delete:
      tags:
        - Collection Configuration
      summary: Delete the Configuration
      description: Delete the configuration identified by `{id}`
      operationId: deleteConfiguration
      parameters:
        - name: id
          in: path
          description: Collection Configuration id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Case was deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 200
                id: 101
                message: OK
        '400':
          description: Configuration {id} could not be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Configuration {id} could not be deleted
        '504':
          description: Waiting for the model to load
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 504
                id: 101
                message: Waiting for the model to load
  /v2/logs:
    get:
      tags:
        - Log
      summary: Returns the log entries (errors and warnings) associated with the specified job
      description: Returns the log entries (errors and warnings) associated with the specified job
      operationId: listLogByJob
      parameters:
        - name: jobId
          in: query
          description: ID of the job for which log information should be displayed
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Log Listing was submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogEntry'
              example:
                logs:
                  - name: Warning
                    scope: Client
                    severity: Warning
                    grouping: ''
                    jobId: 103
                    userId: null
                    description: Could NOT Open and Read Owner Info on First Try - Succeeded with Snapshot
                    date: 7/18/20 9:08 PM
                    computerId: ''
                  - name: Error
                    scope: Client
                    severity: Error
                    grouping: ''
                    jobId: 103
                    userId: null
                    description: Job cancelled by user.
                    date: 7/18/20 9:09 PM
                    computerId: ''
        '204':
          description: No Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 204
                message: No Content.
        '400':
          description: error response - log entries not retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              examples:
                job_id_not_found:
                  summary: Job ID not found
                  value:
                    code: 400
                    id: 101
                    message: Job ID was not found
                job_id_param_missing:
                  summary: Job ID parameter missing
                  value:
                    code: 400
                    id: 101
                    message: Query parameter "jobId" expected, but not found.
  /v2/jobs/{id}:
    get:
      tags:
        - Job
      summary: Display details of the specified job
      description: Display details the job specified by the id in the path (URL)
      operationId: jobDetails
      parameters:
        - name: id
          in: path
          description: id of the job
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Job details found
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/jobDetail'
              example:
                jobs:
                  - id: 103
                    taskName: Collect
                    label: ''
                    caseName: Testing
                    status: Cancelled
                    warnings: 3
                    errors: 1
                    bytesCollected: 0
                    bytesToCollect: 0
                    filesCollected: 0
                    filesToCollect: 126600
                    collectionId: 103
                    collectionName: Email Collect3
                    custodianName: ''
                    custodianId: 1
                    targetName: ''
                    targetId: 1
                    destination: |-
                      c:\collection\Testing\Email Collect3\AUSYD-L-NX0142\FileSafe\AUSYD-L-NX0142 2020-07-18 21-08-23.

                      mfs01
                    beginTime: |-
                      2020-07-18T11:08:23.

                      711Z
                    endTime: |-
                      2020-07-18T11:09:53.

                      757Z
                    computerId: E21287F5-9E96-6CFF-0624-056AFA28E902
                    computerName: AUSYD-L-NX0142
        '400':
          description: Job ID not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Invalid Job ID supplied
  /v2/jobs:
    post:
      tags:
        - Job
      summary: Lists all jobs that match the specified filter
      description: |-
        Lists all jobs matching the filter criteria specified in the JSON body.

        ### Job fields available for filtering and sorting\:

        | Field name        | Type    | Description / Possible Values            |
        | ----------------- | ------- | ---------------------------------------- |
        | BeginTime         | String  | Job start date and time                  |
        | BytesCollected    | String  | Bytes collected so far                   |
        | BytesToCollect    | Long    | Total bytes to be collected              |
        | CaseName          | String  | Case name                                |
        | CollectionID      | Long    | Collection ID number                     |
        | CollectionName    | String  | Collection name                          |
        | ComputerID        | String  | Computer ID number                       |
        | ComputerName      | String  | Computer name                            |
        | CustodianID       | Long    | Custodian ID number                      |
        | CustodianName     | String  | Custodian name                           |
        | Destination       | String  | Destination path                         |
        | DestinationType   | String  | Destination type, one of                 |
        | EndTime           | String  | Job end date and time                    |
        | ID                | Long    | Job ID number                            |
        | Label             | String  | Label value associated with this Job     |
        | NumErrors         | Long    | Number of errors encountered so far      |
        | NumFilesCollected | Long    | Number of files collected so far         |
        | NumFilesToCollect | Long    | Total number fo files to collect         |
        | NumWarninings     | Long    | Number of warnings encountered so far    |
        | PausedMinutes:    | String  | Number of minutes to job has been paused |
        | Priority          | String  | Job priority number                      |
        | ProgramName       | String  | Name of program performing the job       |
        | ReportingTime     | String  | Date and time of last job status report  |
        | Stage             | String  | Job stage                                |
        | Status            | String  | Job status (see list below)              |
        | SubmitTime        | String  | Date and time job was sbmitted           |
        | TargetID          | Long    | Target ID number                         |
        | TargetName        | String  | Target name                              |
        | TaskName          | String  | Task name                                |
        | TaskNumber        | Integer | Task ID number                           |
        | TotalTasks        | Integer | Total number of tasks in this job        |


        ### Job status values\:

        Awaiting Resource, Cancelled, Cancelling, Failed, Finished, Paused, Pausing, PickedUp, Ready, Resumed, Resuming, Running, Suspended, Suspending, Waiting

      operationId: listJobsByFilter
      parameters:
        - name: offset
          in: query
          description: zero-based offset in the list of computers at which retrieval should start
          required: false
          schema:
            type: integer
        - name: version
          in: query
          description: |-
            version of the Jobs table, obtained from the last call to this function.

            The Jobs table in the ECC Server database gets a new version whenever it is modified.
            This version is returned in the response body for this query in the field `tableVersion`.

            If `version` is supplied, it is compared to the current version of the Jobs table.
            If the version numbers match, there is no updated data since the last call,
            and the query is aborted with a **204, 'No Content.'** response code.
          required: false
          schema:
            type: integer
        - name: countOnly
          in: query
          description: |-
            if `true`, the total count for this query (ignoring `limit` and `offset`) is returned in the Response Body, with no other data.

            This should be used ahead of the actual query to determine the total number of records in the response.
          required: false
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/listJobRequest'
            example:
              limit: -1
              filters:
                - name: CollectionID
                  value: 109
      responses:
        '200':
          description: Job Listing was submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  tableVersion:
                    type: integer
                    description: |-
                      current version of the Jobs table in the ECC database.

                      Use this in subsequent Job List commands, in the query field `version`, to prevent unneeded queries.
                  totalCount:
                    type: integer
                    description: total number of jobs for this response, as if `limit` was not provided
                  startRow:
                    type: integer
                    description: starting row of this response within the total count
                  endRow:
                    type: integer
                    description: ending row of this response within the total count
                  next:
                    type: string
                    description: |-
                      URL to get the next set of responses.

                      Included only if `endRow` does not include all available responses.
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/jobListDetail'
              example:
                tableVersion: 0
                totalCount: 2
                startRow: 0
                endRow: 0
                next: /api/ecc/v2/jobs?offset=1
                jobs:
                  - id: 109
                    taskName: Collect
                    label: ''
                    caseName: Group
                    status: Finished
                    warnings: 0
                    errors: 1
                    bytesCollected: 138007
                    bytesToCollect: 138007
                    filesCollected: 5
                    filesToCollect: 30
                    collectionId: 109
                    collectionName: |-
                      Group Test 8.

                      12pm
                    custodianName: Unassigned
                    custodianId: 1
                    targetName: _System
                    targetId: 1
                    destination: |-
                      c:\collection\Group\Group Test 8.

                      12pm\AUSYD-L-NX0142\FileSafe\AUSYD-L-NX0142 2020-07-19 20-13-13.

                      mfs01
                    beginTime: |-
                      2020-07-19T10:13:13.

                      000Z
                    endTime: |-
                      2020-07-19T10:14:00.

                      000Z
                    computerId: E21287F5-9E96-6CFF-0624-056AFA28E902
                    computerName: AUSYD-L-NX0142
  /v2/jobAction/{id}:
    post:
      tags:
        - Job
      summary: Modifies the state of the specified job
      description: |-
        Modify the job state of the job identified by the id in the URL.  The `action` string in the body applies the following state change to the job\:

        | Action   | Description                                             |
        | -------- | ------------------------------------------------------- |
        | Cancel   | cancels the job                                         |
        | Pause    | pause the job (can be continued)                        |
        | Continue | continues a paused job                                  |
        | Resume   | resumes a failed or stopped job from where it stopped   |
        | Restart  | restarts a job from the beginning                       |

      operationId: jobAction
      parameters:
        - name: id
          in: path
          description: id of the job
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/jobActionRequest'
            example:
              action: "Pause"
      responses:
        '200':
          description: Job status changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 200
                id: 100
                message: OK
        '400':
          description: error response - job status has not been changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              examples:
                job_action_not_recognized:
                  summary: Job action not recognized
                  value:
                    code: 400
                    id: 101
                    message: "Action Terminate is not a recognized job state."
                job_action_unknown:
                  summary: Job action unknown
                  value:
                    code: 400
                    id: 101
                    message: "Job action, null is an unknown action."
                job_action_unavailable:
                  summary: Job action unavailable
                  value:
                    code: 400
                    id: 101
                    message: "Action Pause is unavailable in Paused state of a job."
                job_action_error:
                  summary: Job action error
                  value:
                    code: 400
                    id: 101
                    message: "Error changing the job state to Paused"
