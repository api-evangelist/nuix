                    computerId: E21287F5-9E96-6CFF-0624-056AFA28E902
                    jobs:
                      - id: 102
                        taskName: Collect
                        taskNum: 1
                        totalTasks: 1
        '400':
          description: Invalid Case ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Invalid Case ID supplied
        '504':
          description: No valid targets selected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 504
                id: 101
                message: No valid targets selected
  /v2/collectionsByPath:
    post:
      tags:
        - Collection and Survey
      summary: Launch a new collection explicitly defining folders and files with no custodian.
      description: |-
        Launch a new collection explicitly defining folders and files with no custodian.

        **Note\:** if autoDetect is used it must have the value AllLocalVolumes and when used all files and folders fields are ignored.
      operationId: launchCollectionsByPath
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/launchCaseCollectionByPathRequest'
            example:
              caseId: 0
              name: name of the new collection
              computerId: ABCDEF-12345
              configurationId: 0
              location: C://collections
              label: a label
              autodetect: ''
              folders:
                - c:/path1
                - c:/path2
              files:
                - C:/path/file1.csv
                - C:/path/file2.txt
              folderSpec:
                - folder: C://somePath
                  excludeFolders:
                    - subPath
                    - subPath2
                  excludeFiles:
                    - someFile.txt
                    - someFile2.txt
                  excludeWildcards:
                    - '*.pdf'
      responses:
        '200':
          description: Collection was submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/launchCaseCollectionResponse'
              example:
                collectionId: 103
                computers:
                  - computerName: AUSYD-L-NX0142
                    computerId: E21287F5-9E96-6CFF-0624-056AFA28E902
                    jobs:
                      - id: 102
                        taskName: Collect
                        taskNum: 1
                        totalTasks: 1
        '400':
          description: Invalid Case/Computer ID supplied or no collections were specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Invalid Case ID supplied
        '504':
          description: No valid targets selected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 504
                id: 101
                message: No valid targets selected
  /v2/collectionsByTarget:
    post:
      tags:
        - Collection and Survey
      summary: Launch a new collection specifying only target and collection configuration
      description: |-
        Launch a new collection specifying only target and collection Configuration.

        **Note\:** All other job criteria will be determined from the specified Collection Configuration
      operationId: launchCollectionsByTarget
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/launchCaseCollectionByTargetRequest'
            example:
              caseId: 0
              name: name of the new collection
              targetId: 1
              configurationId: 0
              location: C://collections
      responses:
        '200':
          description: Collection was submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/launchCaseCollectionResponse'
              example:
                collectionId: 103
                computers:
                  - computerName: AUSYD-L-NX0142
                    computerId: E21287F5-9E96-6CFF-0624-056AFA28E902
                    jobs:
                      - id: 102
                        taskName: Collect
                        taskNum: 1
                        totalTasks: 1
        '400':
          description: Invalid Case/Target ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Invalid Case ID supplied
        '504':
          description: No valid targets selected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 504
                id: 101
                message: No valid targets selected
  /v2/collectionsByConfiguration:
    post:
      tags:
        - Collection and Survey
      summary: Launch a new collection for a specific computer and Collection Configuration
      description: |-
        Launch a new collection for a specific computer and Collection Configuration.

        Optionally, the destination can be specified in the `location` field.

        **Note\:** since no targets or explicit sources are defined in the API body, the specified Collection Configuration must specify the collection source(s).

        **Note\:** if the specified Collection Configuration contains targets, they will be ignored in favor of the specified computer.
      operationId: launchCollectionsByConfiguration
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/launchCaseCollectionByConfigurationRequest'
            example:
              caseId: 0
              name: name of the new collection
              computerId: 1
              configurationId: 0
              location: C://collections
      responses:
        '200':
          description: Collection was submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/launchCaseCollectionByConfigurationResponse'
              example:
                collectionId: 103
                computers:
                  - computerName: AUSYD-L-NX0142
                    computerId: E21287F5-9E96-6CFF-0624-056AFA28E902
                    jobs:
                      - id: 102
                        taskName: Collect
                        taskNum: 1
                        totalTasks: 1
        '400':
          description: Invalid Case/Computer/Configuration ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Invalid Case ID supplied
        '504':
          description: No valid targets selected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 504
                id: 101
                message: No valid targets selected
  /v2/eccInstalled:
    get:
      tags:
        - Utility
      summary: Verify whether ECC Client or ECC Admin Console is installed on the specified computer.
      description: |-
        Verify whether ECC Client or ECC Admin Console is installed on the specified computer.
        If ECC Client or ECC Admin Console is installed, returns the name of the specified computer.
        If ECC client or ECC Admin Console is not installed, returns an ID 400 response.
      operationId: eccInstalled
      parameters:
        - name: computerId
          in: query
          description: GUID which identifies the computer
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful query of ECC Installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  computer name:
                    type: string
                    description: name of the computer identified by `computerId`
              example:
                computer name: |-
                  someComputer.

                  local
        '400':
          description: Invalid Computer ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              example:
                code: 400
                id: 101
                message: Computer ID was not found
