    url: https://www.nuix.com/nuix-developer-program
- aid: nuix:nuix-discover-connect-api
  name: Nuix Discover Connect API
  description: GraphQL-based API for querying and managing discovery data within Nuix
    Discover, supporting queries and mutations for document review, production sets,
    and legal analytics workflows.
