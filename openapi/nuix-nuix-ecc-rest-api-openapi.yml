                value:
                  groupId: 16
                  addCustodians:
                    - custodianId: 79
                    - custodianId: 80
              remove_custodians_from_group:
                summary: 'Remove custodians from a group'
                value:
                  groupId: 16
                  removeCustodians:
                    - custodianId: 42
                    - custodianId: 49
      responses:
        '200':
          description: Group was modified successfully
