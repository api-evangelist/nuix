        computerId:
          type: string
          description: GUID value that identifies the computer
        configurationId:
          type: integer
          description: id of the collection configuration to use for collection criteria
        location:
          type: string
          description: destination of the collection (if blank uses the location within the specified collection configuration)
    launchCaseCollectionByTargetRequest:
      type: object
