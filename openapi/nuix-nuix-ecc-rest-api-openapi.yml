                id: 100
                message: 'OK'
        '400':
          description: Failed to modify group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/standardResponse'
              examples:
                failed_group_modify_json:
                  summary: 'No json body'
                  value:
                    code: 400
                    id: 101
                    message: 'No json body was provided.'
                failed_group_modify_empty:
                  summary: 'Cannot rename group to an empty string'
